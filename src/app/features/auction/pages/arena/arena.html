<section class="arena-page">
  <div class="starfield"></div>
  <div class="starfield starfield-mid"></div>
  <div class="starfield starfield-near"></div>
  <div class="ambient ambient-left"></div>
  <div class="ambient ambient-right"></div>

  <header class="arena-header">
    <p class="kicker">Live Bid Arena</p>
    <h1>Mesa de Subastas Pro</h1>
    <p class="subtitle">Tension de poker, ritmo en tiempo real y pujas al limite.</p>
  </header>

  <app-auction-clock
    [timeLeft]="(timeLeft$ | async)!"
    [status]="(status$ | async)!"
  ></app-auction-clock>

  <aside class="debug-panel">
    <p class="debug-title">Debug Flux</p>
    <p>Estado: <strong>{{ (status$ | async) }}</strong></p>
    <p>Tiempo: <strong>{{ (timeLeft$ | async) }}s</strong></p>
    <p>Precio: <strong>${{ (price$ | async) }}</strong></p>
    <p>Ultimo postor: <strong>{{ (lastBidder$ | async) }}</strong></p>
  </aside>

  <app-auction-table
    [price]="(price$ | async)!"
    [status]="(status$ | async)!"
    [lastBidder]="(lastBidder$ | async)!"
  ></app-auction-table>

  <app-bid-console
    [isDisabled]="(status$ | async) === 'FINISHED'"
    [status]="(status$ | async)!"
    (bid)="bid($event)"
  ></app-bid-console>
</section>
