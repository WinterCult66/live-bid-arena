<div class="table-container">

  <!-- Jugadores -->
  <div class="player top">👤 P1</div>
  <div class="player left">👤 P2</div>
  <div class="player right">👤 P3</div>
  <div class="player bottom">🧑 Tú</div>

  <!-- Mesa -->
  <div class="table">
    <div class="center">
      <h2>💰 ${{ price }}</h2>
      <p [class.danger]="time < 10">⏱️ {{ time }}s</p>
    </div>
  </div>

</div>
