<div class="table-container">
  <div class="spotlight"></div>

  <div class="player top">
    <span class="chair"></span>
    <span class="avatar avatar-1">A</span>
    <span class="name">Rival A</span>
  </div>
  <div class="player left">
    <span class="chair"></span>
    <span class="avatar avatar-2">B</span>
    <span class="name">Rival B</span>
  </div>
  <div class="player right">
    <span class="chair"></span>
    <span class="avatar avatar-3">C</span>
    <span class="name">Rival C</span>
  </div>
  <div class="player bottom">
    <span class="chair"></span>
    <span class="avatar avatar-you">T</span>
    <span class="name">Tu asiento</span>
  </div>

  <div class="table">
    <div class="table-inner">
      <div class="pot-label">Puja actual</div>
      <h2 class="pot-value">${{ price }}</h2>
      <p class="status" [class.finished]="status === 'FINISHED'">
        Estado: {{ status }}
      </p>

      @if (status === 'FINISHED') {
        <p class="winner">🏆 Ganador: {{ lastBidder }}</p>
      } @else {
        <p class="leader">Lider actual: {{ lastBidder }}</p>
      }
    </div>
  </div>
</div>
